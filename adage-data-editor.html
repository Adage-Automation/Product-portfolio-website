<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product Editor — Adage Automation</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
:root {
  --bg:       #ffffff;
  --bg2:      #f7f8f8;
  --bg3:      #eef0f0;
  --border:   #dde2e2;
  --border2:  #b8c0c0;
  --text:     #1a2222;
  --text2:    #5a6464;
  --text3:    #9aa4a4;
  --teal:     #0b6e6e;
  --teal-pale:#e6f4f4;
  --teal-dark:#084f4f;
  --danger:   #c0392b;
  --danger-bg:#fdf0ee;
  --success:  #0b6e6e;
  --radius:   6px;
  --radius-lg:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:14px;background:var(--bg2);color:var(--text);min-height:100vh}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo i{color:#fff;font-size:18px}
.app-title{font-size:15px;font-weight:700;color:var(--text)}
.app-sub{font-size:12px;color:var(--text2)}
.topbar-right{display:flex;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);cursor:pointer;transition:background .12s,border-color .12s;font-family:inherit;text-decoration:none}
.btn:hover{background:var(--bg3);border-color:var(--border2)}
.btn.primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn.primary:hover{background:var(--teal-dark)}
.btn.danger{color:var(--danger);border-color:#f1c4be}
.btn.danger:hover{background:var(--danger-bg)}
.wrap{max-width:1200px;margin:0 auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.stat{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;transition:border-color .15s,box-shadow .15s}
.stat.clickable{cursor:pointer}
.stat.clickable:hover{border-color:var(--teal);box-shadow:0 2px 10px rgba(11,110,110,.1)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:4px;display:flex;align-items:center;gap:5px}
.stat-label i{font-size:12px;color:var(--teal);opacity:0;transition:opacity .15s}
.stat.clickable:hover .stat-label i{opacity:1}
.stat-val{font-size:26px;font-weight:700;color:var(--text)}
/* ── DRILL-DOWN MODAL ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;align-items:center;justify-content:center}
.modal-backdrop.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);width:420px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18);overflow:hidden}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:14px;font-weight:700;color:var(--text)}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;line-height:1;padding:2px;display:flex;align-items:center}
.modal-close:hover{color:var(--text)}
.modal-body{overflow-y:auto;padding:8px 0}
.drill-item{display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--border)}
.drill-item:last-child{border-bottom:none}
.drill-name{font-size:13px;font-weight:500;color:var(--text)}
.drill-count{font-size:12px;font-weight:600;color:var(--teal);background:var(--teal-pale);padding:2px 10px;border-radius:20px}
.layout{display:grid;grid-template-columns:230px 1fr;gap:16px;align-items:flex-start}
.sidebar{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.sidebar-head{padding:12px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:1px solid var(--border)}
.prod-list{max-height:calc(100vh - 280px);overflow-y:auto}
.prod-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);gap:8px;transition:background .1s}
.prod-item:last-child{border-bottom:none}
.prod-item:hover{background:var(--bg2)}
.prod-item.active{background:var(--teal-pale)}
.prod-item-info{overflow:hidden;flex:1}
.prod-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-company{font-size:11px;color:var(--text2);margin-top:1px}
.prod-del{opacity:0;background:none;border:none;cursor:pointer;color:var(--danger);font-size:16px;padding:2px;line-height:1;border-radius:4px;display:flex;align-items:center}
.prod-item:hover .prod-del{opacity:1}
.add-btn{width:100%;display:flex;align-items:center;gap:6px;padding:11px 14px;font-size:13px;color:var(--teal);background:none;border:none;border-top:1px solid var(--border);cursor:pointer;font-family:inherit;font-weight:500;transition:background .1s}
.add-btn:hover{background:var(--teal-pale)}
.panel{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:300px;color:var(--text3)}
.empty i{font-size:40px}
.empty p{font-size:13px}
.section-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:12px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.field-full{grid-column:1/-1}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:5px}
input[type=text],input[type=url],textarea,select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(11,110,110,.1)}
textarea{min-height:76px;resize:vertical}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.tags-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;min-height:24px}
.tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--teal-pale);border:1px solid rgba(11,110,110,.2);border-radius:20px;font-size:12px;color:var(--teal-dark)}
.tag button{background:none;border:none;cursor:pointer;color:var(--teal);font-size:15px;line-height:1;padding:0;display:flex;align-items:center}
.tag-add{display:flex;gap:8px}
.tag-add input{flex:1}
.tag-add button{padding:9px 16px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-family:inherit;white-space:nowrap;color:var(--text);transition:background .1s}
.tag-add button:hover{background:var(--bg3)}
.form-actions{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.save-notice{font-size:12px;color:var(--success);font-weight:500;opacity:0;transition:opacity .3s;display:flex;align-items:center;gap:4px}
.save-notice.show{opacity:1}
.save-status{font-size:12px;font-weight:500;margin-left:8px}
.save-status.ok{color:var(--success)}
.save-status.err{color:var(--danger)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo"><i class="ti ti-settings-2"></i></div>
    <div>
      <div class="app-title">Product Editor</div>
      <div class="app-sub" id="prodCountSub">Loading…</div>
    </div>
  </div>
  <div class="topbar-right">
    <a class="btn" href="library.html"><i class="ti ti-arrow-left"></i> Back to Library</a>
    <button class="btn primary" onclick="saveToPortal()"><i class="ti ti-cloud-upload"></i> Save to portal</button>
    <button class="btn" onclick="downloadFile()"><i class="ti ti-download"></i> Download CSV</button>
  </div>
</div>

<div class="wrap">
  <div class="stats">
    <div class="stat"><div class="stat-label">Products</div><div class="stat-val" id="statTotal">0</div></div>
    <div class="stat clickable" onclick="openDrillDown('industries')" title="Click to see breakdown">
      <div class="stat-label">Industries <i class="ti ti-chevron-right"></i></div>
      <div class="stat-val" id="statInd">0</div>
    </div>
    <div class="stat clickable" onclick="openDrillDown('companies')" title="Click to see breakdown">
      <div class="stat-label">Companies <i class="ti ti-chevron-right"></i></div>
      <div class="stat-val" id="statCo">0</div>
    </div>
  </div>

  <!-- DRILL-DOWN MODAL -->
  <div class="modal-backdrop" id="modalBackdrop" onclick="closeDrillDown(event)">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Breakdown</h3>
        <button class="modal-close" onclick="closeDrillDown()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-head">Products</div>
      <div class="prod-list" id="prodList"></div>
      <button class="add-btn" onclick="addProduct()"><i class="ti ti-plus"></i> Add product</button>
    </div>
    <div>
      <div class="panel" id="editPanel">
        <div class="empty">
          <i class="ti ti-file-description"></i>
          <p>Select a product to edit, or add a new one</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="js/load-products.js"></script>
<script>
// Admin-only editor
const editorUser = sessionStorage.getItem("adage_user");
if (editorUser !== "admin@adageautomation.com") {
  window.location.href = editorUser ? "library.html" : "index.html";
}

// Mutable working copy — loaded from server or data.csv
let products = [];
let activeId = null;
let nextId = 1;

async function initEditor() {
  await loadProductsFromServer();
  products = PRODUCTS.map(p => ({
    ...p,
    industries:       [...(p.industries       || [])],
    useCases:         [...(p.useCases         || [])],
    tags:             [...(p.tags             || [])],
    technologyTags:   [...(p.technologyTags   || [])],
    measuredComponent:[...(p.measuredComponent|| [])],
  }));
  nextId = products.length ? Math.max(...products.map(p => p.id)) + 1 : 1;

  renderList();

  const urlId = parseInt(new URLSearchParams(window.location.search).get("id"), 10);
  if (urlId && products.some(p => p.id === urlId)) {
    selectProduct(urlId);
  }
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateStats(){
  document.getElementById('statTotal').textContent = products.length;
  document.getElementById('statInd').textContent = new Set(products.flatMap(p=>p.industries||[]).filter(Boolean)).size;
  document.getElementById('statCo').textContent = new Set(products.map(p=>p.company).filter(Boolean)).size;
  document.getElementById('prodCountSub').textContent = products.length + ' products';
}

function renderList(){
  const el = document.getElementById('prodList');
  el.innerHTML = '';
  products.forEach(p=>{
    const div = document.createElement('div');
    div.className = 'prod-item' + (p.id===activeId?' active':'');
    div.innerHTML = `
      <div class="prod-item-info">
        <div class="prod-name">${esc(p.name||'Untitled')}</div>
        <div class="prod-company">${esc(p.company||'—')}</div>
      </div>
      <button class="prod-del" title="Delete product" onclick="deleteProduct(event,${p.id})">
        <i class="ti ti-trash"></i>
      </button>`;
    div.onclick = (e)=>{ if(!e.target.closest('.prod-del')) selectProduct(p.id); };
    el.appendChild(div);
  });
  updateStats();
}

function selectProduct(id){
  activeId = id;
  renderList();
  const p = products.find(x=>x.id===id);
  if(p) renderForm(p);
}

function renderTagsHTML(tags, field){
  return (tags||[]).map(t=>`<span class="tag">${esc(t)}<button onclick="removeTagFrom('${field}','${esc(t).replace(/'/g,"\\'")}')"><i class="ti ti-x" style="font-size:11px"></i></button></span>`).join('');
}

function renderForm(p){
  document.getElementById('editPanel').innerHTML = `
    <div class="section-head">Edit product</div>
    <div class="field-grid">
      <div class="field field-full">
        <label>Product name</label>
        <input type="text" value="${esc(p.name)}" oninput="upd('name',this.value)" placeholder="e.g. FlowMaster Pro 3000"/>
      </div>
      <div class="field">
        <label>Company / Brand</label>
        <input type="text" value="${esc(p.company)}" oninput="upd('company',this.value)" placeholder="e.g. Emerson"/>
      </div>
      <div class="field">
        <label>File / Folder Link</label>
        <input type="url" value="${esc(p.onedrive)}" oninput="upd('onedrive',this.value)" placeholder="https://…"/>
      </div>
      <div class="field field-full">
        <label>Description</label>
        <textarea oninput="upd('description',this.value)" placeholder="One paragraph product description.">${esc(p.description)}</textarea>
      </div>
      <div class="field field-full">
        <label>Image URL <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="url" value="${esc(p.image)}" oninput="upd('image',this.value)" placeholder="Leave blank for auto placeholder"/>
      </div>
    </div>
    <hr class="divider"/>

    ${renderTagSection('Industries', 'industries', p.industries, 'industryInput', 'e.g. Oil & Gas')}
    <hr class="divider"/>
    ${renderTagSection('Use Cases', 'useCases', p.useCases, 'useCasesInput', 'e.g. Gas Chromatograph')}
    <hr class="divider"/>
    ${renderTagSection('Technology Tags', 'technologyTags', p.technologyTags, 'technologyTagsInput', 'e.g. HART')}
    <hr class="divider"/>
    ${renderTagSection('Measured Component', 'measuredComponent', p.measuredComponent, 'measuredComponentInput', 'e.g. CO2')}
    <hr class="divider"/>
    ${renderTagSection('Tags', 'tags', p.tags, 'tagsInput', 'e.g. Refinery')}

    <div class="form-actions">
      <span class="save-notice" id="saveNotice"><i class="ti ti-check"></i> Saved</span>
      <button class="btn danger" onclick="deleteProduct(null,${p.id})"><i class="ti ti-trash"></i> Delete product</button>
    </div>
  `;
}

function renderTagSection(label, field, values, inputId, placeholder) {
  return `
    <div class="section-head">${label}</div>
    <div class="tags-row" id="tagRow_${field}">${renderTagsHTML(values, field)}</div>
    <div class="tag-add">
      <input type="text" id="${inputId}" placeholder="${placeholder}"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addTagTo('${field}','${inputId}')}"/>
      <button onclick="addTagTo('${field}','${inputId}')"><i class="ti ti-plus"></i> Add</button>
    </div>`;
}

function upd(field, value){
  const p = products.find(x=>x.id===activeId);
  if(!p) return;
  p[field] = value;
  showSaved();
  updateStats();
  if(field==='name'||field==='company') renderList();
  refreshPreview();
}



function showSaved(){
  const el = document.getElementById('saveNotice');
  if(!el) return;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 1800);
}

function addTagTo(field, inputId){
  const inp = document.getElementById(inputId);
  const val = (inp.value||'').trim();
  if(!val) return;
  const p = products.find(x=>x.id===activeId);
  if(!p) return;
  if(!Array.isArray(p[field])) p[field]=[];
  if(!p[field].includes(val)) p[field].push(val);
  inp.value='';
  document.getElementById('tagRow_'+field).innerHTML = renderTagsHTML(p[field], field);
  showSaved();
  refreshPreview();
}

function removeTagFrom(field, tag){
  const p = products.find(x=>x.id===activeId);
  if(!p) return;
  p[field] = (p[field]||[]).filter(t=>t!==tag);
  document.getElementById('tagRow_'+field).innerHTML = renderTagsHTML(p[field], field);
  showSaved();
  refreshPreview();
}

function addProduct(){
  const p = {
    id: nextId++, name: 'New Product', company: '',
    industries: [], useCases: [], description: '',
    onedrive: '', tags: [], technologyTags: [], measuredComponent: [], image: ''
  };
  products.push(p);
  selectProduct(p.id);
}

function deleteProduct(e, id){
  if(e) e.stopPropagation();
  const p = products.find(x=>x.id===id);
  if(!confirm('Delete "' + (p?p.name:'this product') + '"?')) return;
  products = products.filter(p=>p.id!==id);
  if(activeId===id){
    activeId=null;
    document.getElementById('editPanel').innerHTML='<div class="empty"><i class="ti ti-file-description"></i><p>Select a product to edit, or add a new one</p></div>';
  }
  renderList();
  refreshPreview();
}

function csvField(value){
  const str = value == null ? '' : String(value);
  if(str.includes(',') || str.includes('"') || str.includes('\n')){
    return '"' + str.replace(/"/g,'""') + '"';
  }
  return str;
}

function generateCSV(){
  const headers = ['id','name','company','industries','useCases','description','onedrive','tags','technologyTags','measuredComponent','image'];
  const rows = [headers.join(',')];
  products.forEach(p=>{
    rows.push([
      csvField(p.id),
      csvField(p.name),
      csvField(p.company),
      csvField(Array.isArray(p.industries)        ? p.industries.join('|')        : (p.industries||'')),
      csvField(Array.isArray(p.useCases)          ? p.useCases.join('|')          : (p.useCases||'')),
      csvField(p.description),
      csvField(p.onedrive),
      csvField(Array.isArray(p.tags)              ? p.tags.join('|')              : (p.tags||'')),
      csvField(Array.isArray(p.technologyTags)    ? p.technologyTags.join('|')    : (p.technologyTags||'')),
      csvField(Array.isArray(p.measuredComponent) ? p.measuredComponent.join('|') : (p.measuredComponent||'')),
      csvField(p.image)
    ].join(','));
  });
  return rows.join('\n');
}

function togglePreview(){ /* removed */ }
function refreshPreview(){ /* no-op — preview panel removed */ }

function downloadFile(){
  const blob = new Blob([generateCSV()], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'data.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function saveToPortal(){
  // Show status in the topbar area
  let statusEl = document.getElementById('saveStatus');
  if(!statusEl){
    statusEl = document.createElement('span');
    statusEl.id = 'saveStatus';
    document.querySelector('.topbar-right').appendChild(statusEl);
  }
  statusEl.innerHTML = '<span class="save-status">Saving…</span>';

  const authRaw = sessionStorage.getItem('adage_auth');
  if(!authRaw){
    statusEl.innerHTML = '<span class="save-status err">Sign in again as admin, then retry.</span>';
    return;
  }

  let auth;
  try { auth = JSON.parse(authRaw); } catch {
    statusEl.innerHTML = '<span class="save-status err">Session expired. Sign in again.</span>';
    return;
  }

  try {
    const res = await fetch('/api/products', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ products, email: auth.email, password: auth.password })
    });
    const data = await res.json().catch(() => ({}));

    if(res.ok){
      statusEl.innerHTML = '<span class="save-status ok"><i class="ti ti-check"></i> Saved</span>';
      setTimeout(() => { statusEl.innerHTML = ''; }, 3000);
      return;
    }

    if(res.status === 503){
      statusEl.innerHTML = '<span class="save-status err">Vercel KV not connected.</span>';
      return;
    }

    statusEl.innerHTML = `<span class="save-status err">${data.error || 'Save failed.'}</span>`;
  } catch {
    statusEl.innerHTML = '<span class="save-status err">Could not reach /api/products.</span>';
  }
}

function openDrillDown(type) {
  const backdrop = document.getElementById('modalBackdrop');
  const title    = document.getElementById('modalTitle');
  const body     = document.getElementById('modalBody');

  // Build a count map
  const counts = {};
  if (type === 'industries') {
    title.textContent = 'Industries';
    products.forEach(p => {
      (p.industries || []).forEach(ind => {
        counts[ind] = (counts[ind] || 0) + 1;
      });
    });
  } else {
    title.textContent = 'Companies';
    products.forEach(p => {
      if (p.company) counts[p.company] = (counts[p.company] || 0) + 1;
    });
  }

  // Sort alphabetically
  const sorted = Object.entries(counts).sort((a, b) => a[0].localeCompare(b[0]));

  if (!sorted.length) {
    body.innerHTML = '<div style="padding:20px;text-align:center;font-size:13px;color:var(--text3)">No data yet.</div>';
  } else {
    body.innerHTML = sorted.map(([name, count]) => `
      <div class="drill-item">
        <span class="drill-name">${esc(name)}</span>
        <span class="drill-count">${count} product${count !== 1 ? 's' : ''}</span>
      </div>`).join('');
  }

  backdrop.classList.add('open');
}

function closeDrillDown(e) {
  // Close only if clicking the backdrop itself, or the close button
  if (e && e.target !== document.getElementById('modalBackdrop')) return;
  document.getElementById('modalBackdrop').classList.remove('open');
}

initEditor();
</script>
</body>
</html>
