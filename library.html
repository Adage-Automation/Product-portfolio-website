<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Library — Adage Automation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    /* ── TOKENS ── */
    :root {
      --teal:        #0B6E6E;
      --teal-light:  #0D8080;
      --teal-pale:   #E6F4F4;
      --teal-dark:   #084F4F;
      --white:       #FFFFFF;
      --grey-50:     #F7F8F8;
      --grey-100:    #EEF0F0;
      --grey-200:    #DDE2E2;
      --grey-300:    #B8C0C0;
      --grey-600:    #5A6464;
      --grey-800:    #2C3838;
      --grey-900:    #1A2222;

      --font-ui:     'Inter', system-ui, -apple-system, sans-serif;
      --radius:      6px;
      --radius-card: 8px;
      --shadow-card: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(11,110,110,.07);
      --nav-h:       60px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-ui);
      background: var(--grey-50);
      color: var(--grey-900);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: var(--white);
      border-bottom: 1px solid var(--grey-200);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 20px;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-logo {
      width: 32px; height: 32px;
      background: var(--teal);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }

    .nav-logo svg { width: 18px; height: 18px; fill: white; }

    .nav-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--grey-900);
      line-height: 1.2;
    }

    .nav-title span {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: var(--grey-600);
    }

    .nav-search {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .nav-search input {
      width: 100%;
      padding: 9px 14px 9px 38px;
      border: 1px solid var(--grey-200);
      border-radius: 20px;
      font-size: 14px;
      background: var(--grey-50);
      color: var(--grey-900);
      outline: none;
      transition: border-color .15s, background .15s;
    }

    .nav-search input:focus {
      border-color: var(--teal);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(11,110,110,.10);
    }

    .nav-search .search-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--grey-300);
      pointer-events: none;
    }

    .nav-user {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .nav-user-name {
      font-size: 13px;
      color: var(--grey-600);
    }

    .btn-logout {
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--grey-200);
      border-radius: var(--radius);
      background: white;
      color: var(--grey-600);
      cursor: pointer;
      transition: all .15s;
    }

    .btn-logout:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    /* ── LAYOUT ── */
    .page-wrap {
      display: flex;
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      gap: 24px;
      align-items: flex-start;
    }

    /* ── SIDEBAR FILTERS ── */
    .sidebar {
      width: 240px;
      flex-shrink: 0;
      position: sticky;
      top: calc(var(--nav-h) + 24px);
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--grey-600);
      margin-bottom: 14px;
    }

    .filter-section {
      margin-bottom: 8px;
      position: relative;
    }

    /* ── DROPDOWN TRIGGER (div, not button — avoids nested-button bug) ── */
    .filter-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      padding: 9px 12px;
      background: var(--white);
      border: 1px solid var(--grey-200);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--grey-600);
      cursor: pointer;
      transition: border-color .15s;
      user-select: none;
      gap: 6px;
    }

    .filter-trigger:hover { border-color: var(--grey-300); }

    .filter-trigger.has-value {
      border-color: var(--teal);
      color: var(--teal-dark);
      background: var(--teal-pale);
      font-weight: 600;
    }

    .filter-trigger.open { border-color: var(--teal); }

    .filter-trigger-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ✕ clear button — shown only when a value is active */
    .filter-clear-x {
      display: none;
      align-items: center;
      justify-content: center;
      width: 16px; height: 16px;
      background: var(--teal);
      color: white;
      border-radius: 50%;
      font-size: 10px;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
    }
    .filter-trigger.has-value .filter-clear-x { display: flex; }

    /* chevron arrow — always visible, rotates when open */
    .filter-chevron {
      width: 14px; height: 14px;
      stroke: currentColor;
      fill: none;
      flex-shrink: 0;
      transition: transform .2s;
    }
    .filter-trigger.open .filter-chevron { transform: rotate(180deg); }

    /* ── DROPDOWN PANEL ── */
    .filter-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--white);
      border: 1px solid var(--grey-200);
      border-radius: var(--radius);
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      z-index: 200;
      overflow: hidden;
    }
    .filter-dropdown.open { display: block; }

    .filter-search-wrap {
      padding: 8px;
      border-bottom: 1px solid var(--grey-100);
    }

    .filter-search-wrap input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid var(--grey-200);
      border-radius: var(--radius);
      font-size: 12px;
      font-family: var(--font-ui);
      color: var(--grey-900);
      outline: none;
      background: var(--grey-50);
      transition: border-color .15s;
    }
    .filter-search-wrap input:focus {
      border-color: var(--teal);
      background: var(--white);
    }

    .filter-options {
      max-height: 200px;
      overflow-y: auto;
      padding: 4px 0;
    }

    .filter-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: var(--font-ui);
      color: var(--grey-600);
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: background .1s;
    }
    .filter-option:hover { background: var(--teal-pale); color: var(--teal-dark); }
    .filter-option.selected { color: var(--teal-dark); font-weight: 600; background: var(--teal-pale); }

    .opt-check-box {
      width: 16px; height: 16px;
      flex-shrink: 0;
      border: 1.5px solid var(--grey-300);
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: transparent;
      background: var(--white);
      transition: all .12s;
    }

    .filter-option.selected .opt-check-box {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
    }

    .opt-check {
      width: 14px; height: 14px;
      flex-shrink: 0;
      stroke: var(--teal);
      fill: none;
      opacity: 0;
    }
    .filter-option.selected .opt-check { opacity: 1; }

    .filter-no-results {
      padding: 10px 12px;
      font-size: 12px;
      color: var(--grey-300);
      text-align: center;
    }

    /* ── ACTIVE CHIPS ── */
    .active-filters-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .active-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      background: var(--teal-pale);
      border: 1px solid rgba(11,110,110,.2);
      border-radius: 20px;
      font-size: 12px;
      color: var(--teal-dark);
      font-weight: 500;
    }

    .active-chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--teal);
      font-size: 14px;
      line-height: 1;
      padding: 0;
      display: flex;
      align-items: center;
    }

    .filter-reset {
      font-size: 12px;
      color: var(--teal);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-top: 8px;
      text-decoration: underline;
    }

    /* ── MAIN CONTENT ── */
    .main {
      flex: 1;
      min-width: 0;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .results-count {
      font-size: 13px;
      color: var(--grey-600);
    }

    .results-count strong {
      color: var(--grey-900);
    }

    /* ── PRODUCT GRID ── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: var(--white);
      border: 1px solid var(--grey-200);
      border-radius: var(--radius-card);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: box-shadow .15s, border-color .15s, transform .15s;
      cursor: pointer;
    }

    .product-card:hover {
      box-shadow: var(--shadow-card);
      border-color: var(--teal-light);
      transform: translateY(-2px);
    }

    .card-thumb {
      height: 140px;
      background: var(--teal-pale);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* Placeholder: icon centred on tinted background, no text */
    .card-thumb .placeholder-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
    }

    .card-thumb .placeholder-icon i {
      font-size: 40px;
      color: var(--teal);
      opacity: .45;
    }

    .card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-meta {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 20px;
    }

    .badge-industry {
      background: var(--teal-pale);
      color: var(--teal-dark);
    }

    .badge-company {
      background: var(--grey-100);
      color: var(--grey-600);
    }

    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--grey-900);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: var(--grey-600);
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid var(--grey-100);
      gap: 8px;
    }

    .btn-open-folder {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--teal);
      color: white;
      font-size: 12px;
      font-weight: 600;
      border-radius: var(--radius);
      text-decoration: none;
      transition: background .15s;
      white-space: nowrap;
    }

    .btn-open-folder:hover { background: var(--teal-dark); }

    .btn-open-folder i { font-size: 13px; }

    .card-footer svg {
      width: 14px; height: 14px;
      stroke: var(--teal);
      fill: none;
    }

    .card-footer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .btn-edit {
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--grey-600);
      background: var(--grey-100);
      border: 1px solid var(--grey-200);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .btn-edit:hover {
      background: var(--teal-pale);
      border-color: var(--teal-light);
      color: var(--teal);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1/-1;
      padding: 60px 24px;
      text-align: center;
    }

    .empty-state svg {
      width: 48px; height: 48px;
      fill: var(--grey-300);
      margin-bottom: 16px;
    }

    .empty-state h3 {
      font-size: 16px;
      color: var(--grey-600);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 13px;
      color: var(--grey-300);
    }
  </style>
</head>
<body>

  <!-- ── NAV ── -->
  <nav>
    <a class="nav-brand" href="library.html">
      <div class="nav-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16zm-1-5h2v2h-2zm0-8h2v6h-2z"/></svg>
      </div>
      <div class="nav-title">
        Adage Automation
        <span>Product Portal</span>
      </div>
    </a>

    <div class="nav-search">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search products, companies, categories…" autocomplete="off" />
    </div>

    <div class="nav-user">
      <span class="nav-user-name" id="userName">—</span>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <!-- ── PAGE ── -->
  <div class="page-wrap">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-title">Filters</div>

      <div class="active-filters-bar" id="activeFiltersBar"></div>

      <div class="filter-section" id="fs-industry">
        <div class="filter-trigger" id="ft-industry" onclick="toggleDropdown('industry')">
          <span class="filter-trigger-label" id="fl-industry">Industry</span>
          <span class="filter-clear-x" id="fx-industry" onclick="event.stopPropagation(); clearFilter('industry')">✕</span>
          <svg class="filter-chevron" viewBox="0 0 24 24" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-dropdown" id="fd-industry">
          <div class="filter-search-wrap">
            <input type="text" id="fi-industry" placeholder="Search industries…" oninput="filterDropdown('industry', this.value)" autocomplete="off" />
          </div>
          <div class="filter-options" id="fo-industry"></div>
        </div>
      </div>

      <div class="filter-section" id="fs-company">
        <div class="filter-trigger" id="ft-company" onclick="toggleDropdown('company')">
          <span class="filter-trigger-label" id="fl-company">Company</span>
          <span class="filter-clear-x" id="fx-company" onclick="event.stopPropagation(); clearFilter('company')">✕</span>
          <svg class="filter-chevron" viewBox="0 0 24 24" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-dropdown" id="fd-company">
          <div class="filter-search-wrap">
            <input type="text" id="fi-company" placeholder="Search companies…" oninput="filterDropdown('company', this.value)" autocomplete="off" />
          </div>
          <div class="filter-options" id="fo-company"></div>
        </div>
      </div>

      <div class="filter-section" id="fs-useCase">
        <div class="filter-trigger" id="ft-useCase" onclick="toggleDropdown('useCase')">
          <span class="filter-trigger-label" id="fl-useCase">Use Cases</span>
          <span class="filter-clear-x" id="fx-useCase" onclick="event.stopPropagation(); clearFilter('useCase')">✕</span>
          <svg class="filter-chevron" viewBox="0 0 24 24" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-dropdown" id="fd-useCase">
          <div class="filter-search-wrap">
            <input type="text" id="fi-useCase" placeholder="Search use cases…" oninput="filterDropdown('useCase', this.value)" autocomplete="off" />
          </div>
          <div class="filter-options" id="fo-useCase"></div>
        </div>
      </div>

      <div class="filter-section" id="fs-technologyTag">
        <div class="filter-trigger" id="ft-technologyTag" onclick="toggleDropdown('technologyTag')">
          <span class="filter-trigger-label" id="fl-technologyTag">Technology Tags</span>
          <span class="filter-clear-x" id="fx-technologyTag" onclick="event.stopPropagation(); clearFilter('technologyTag')">✕</span>
          <svg class="filter-chevron" viewBox="0 0 24 24" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-dropdown" id="fd-technologyTag">
          <div class="filter-search-wrap">
            <input type="text" id="fi-technologyTag" placeholder="Search technology tags…" oninput="filterDropdown('technologyTag', this.value)" autocomplete="off" />
          </div>
          <div class="filter-options" id="fo-technologyTag"></div>
        </div>
      </div>

      <div class="filter-section" id="fs-measuredComponent">
        <div class="filter-trigger" id="ft-measuredComponent" onclick="toggleDropdown('measuredComponent')">
          <span class="filter-trigger-label" id="fl-measuredComponent">Measured Component</span>
          <span class="filter-clear-x" id="fx-measuredComponent" onclick="event.stopPropagation(); clearFilter('measuredComponent')">✕</span>
          <svg class="filter-chevron" viewBox="0 0 24 24" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="filter-dropdown" id="fd-measuredComponent">
          <div class="filter-search-wrap">
            <input type="text" id="fi-measuredComponent" placeholder="Search components…" oninput="filterDropdown('measuredComponent', this.value)" autocomplete="off" />
          </div>
          <div class="filter-options" id="fo-measuredComponent"></div>
        </div>
      </div>

      <button class="filter-reset" id="resetBtn" style="display:none" onclick="resetFilters()">Clear all filters</button>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="results-header">
        <span class="results-count" id="resultsCount"></span>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </main>

  </div>

  <script src="data.js"></script>
  <script src="js/load-products.js"></script>
  <script>
    // ── AUTH GUARD ──
    const user = sessionStorage.getItem("adage_user");
    if (!user) window.location.href = "index.html";

    function logout() {
      sessionStorage.removeItem("adage_user");
      sessionStorage.removeItem("adage_auth");
      window.location.href = "index.html";
    }

    // ── FILTER CONFIG ──
    const FILTER_CONFIG = [
      { key: 'industry',          label: 'Industry',           values: () => window.INDUSTRIES          || [] },
      { key: 'company',           label: 'Company',            values: () => window.COMPANIES           || [] },
      { key: 'useCase',           label: 'Use Cases',          values: () => window.USE_CASES           || [] },
      { key: 'technologyTag',     label: 'Technology Tags',    values: () => window.TECHNOLOGY_TAGS     || [] },
      { key: 'measuredComponent', label: 'Measured Component', values: () => window.MEASURED_COMPONENTS || [] },
    ];

    // Each key holds a Set of selected values (multi-select)
    const activeFilters = {
      industry: new Set(), company: new Set(), useCase: new Set(),
      technologyTag: new Set(), measuredComponent: new Set()
    };

    let openDropdown = null;
    let searchQuery  = "";

    // ── EVENT DELEGATION — attach once to each options container ──────────
    // This is the key fix: instead of inline onmousedown on dynamically-created
    // divs (which can silently fail), we attach a single listener to the stable
    // parent container (#fo-*) that was in the HTML from the start.
    function attachOptionListeners() {
      FILTER_CONFIG.forEach(f => {
        const container = document.getElementById('fo-' + f.key);
        container.addEventListener('mousedown', function(e) {
          e.preventDefault(); // prevent blur / outside-click logic firing
          e.stopPropagation();
          const optEl = e.target.closest('.filter-option');
          if (!optEl) return;
          const value = optEl.dataset.value;
          if (value === undefined) return;
          const set = activeFilters[f.key];
          if (set.has(value)) { set.delete(value); } else { set.add(value); }
          renderOptions(f.key, document.getElementById('fi-' + f.key).value);
          updateTriggerLabels();
          renderActiveChips();
          renderCards(getFiltered());
          updateCount();
        });
      });
    }

    // ── DROPDOWN OPEN / CLOSE ──
    function toggleDropdown(key) {
      if (openDropdown === key) { closeAllDropdowns(); return; }
      closeAllDropdowns();
      openDropdown = key;
      document.getElementById('fd-' + key).classList.add('open');
      document.getElementById('ft-' + key).classList.add('open');
      const inp = document.getElementById('fi-' + key);
      inp.value = '';
      renderOptions(key, '');
      setTimeout(() => inp.focus(), 30);
    }

    function closeAllDropdowns() {
      FILTER_CONFIG.forEach(f => {
        document.getElementById('fd-' + f.key).classList.remove('open');
        document.getElementById('ft-' + f.key).classList.remove('open');
      });
      openDropdown = null;
    }

    // Close on outside mousedown
    document.addEventListener('mousedown', e => {
      if (!openDropdown) return;
      if (!e.target.closest('#fs-' + openDropdown)) closeAllDropdowns();
    });

    // ── RENDER OPTIONS ──
    function renderOptions(key, query) {
      const cfg    = FILTER_CONFIG.find(f => f.key === key);
      const all    = cfg.values();
      const q      = query.trim().toLowerCase();
      const values = q ? all.filter(v => v.toLowerCase().includes(q)) : all;
      const el     = document.getElementById('fo-' + key);

      if (!values.length) {
        el.innerHTML = '<div class="filter-no-results">No matches</div>';
        return;
      }

      // data-value carries the option value; no inline event handlers
      el.innerHTML = values.map(v => {
        const sel = activeFilters[key].has(v);
        // Escape for safe use inside an attribute
        const escaped = v.replace(/"/g, '&quot;');
        return `<div class="filter-option ${sel ? 'selected' : ''}" data-value="${escaped}">
          <span class="opt-check-box">${sel ? '✓' : ''}</span>
          ${v}
        </div>`;
      }).join('');
    }

    function filterDropdown(key, query) { renderOptions(key, query); }

    // ── CLEAR ONE FILTER ──
    function clearFilter(key) {
      activeFilters[key].clear();
      updateTriggerLabels();
      renderActiveChips();
      renderCards(getFiltered());
      updateCount();
    }

    // ── CLEAR ALL ──
    function resetFilters() {
      FILTER_CONFIG.forEach(f => activeFilters[f.key].clear());
      document.getElementById("searchInput").value = "";
      searchQuery = "";
      closeAllDropdowns();
      updateTriggerLabels();
      renderActiveChips();
      renderCards(getFiltered());
      updateCount();
    }

    // ── TRIGGER LABEL ──
    function updateTriggerLabels() {
      let anyActive = false;
      FILTER_CONFIG.forEach(f => {
        const set = activeFilters[f.key];
        const triggerEl = document.getElementById('ft-' + f.key);
        const labelEl   = document.getElementById('fl-' + f.key);
        if (set.size > 0) {
          labelEl.textContent = set.size === 1
            ? [...set][0]
            : `${[...set][0]} +${set.size - 1}`;
          triggerEl.classList.add('has-value');
          anyActive = true;
        } else {
          labelEl.textContent = f.label;
          triggerEl.classList.remove('has-value');
        }
      });
      document.getElementById('resetBtn').style.display = anyActive ? 'inline' : 'none';
    }

    // ── ACTIVE CHIPS ──
    function renderActiveChips() {
      const bar = document.getElementById('activeFiltersBar');
      const chips = [];
      FILTER_CONFIG.forEach(f => {
        activeFilters[f.key].forEach(v => {
          const escaped = v.replace(/'/g, "\\'");
          chips.push(`<span class="active-chip">
            <span>${f.label}: ${v}</span>
            <button onclick="removeChip('${f.key}','${escaped}')" title="Remove">✕</button>
          </span>`);
        });
      });
      bar.innerHTML = chips.join('');
    }

    function removeChip(key, value) {
      activeFilters[key].delete(value);
      updateTriggerLabels();
      renderActiveChips();
      renderCards(getFiltered());
      updateCount();
    }

    // ── FILTER LOGIC ──
    function getFiltered() {
      const q = searchQuery.toLowerCase();
      return (window.PRODUCTS || []).filter(p => {
        const f = activeFilters;
        if (f.industry.size > 0          && !(p.industries        || []).some(v => f.industry.has(v)))          return false;
        if (f.company.size > 0           && !f.company.has(p.company))                                          return false;
        if (f.useCase.size > 0           && !(p.useCases          || []).some(v => f.useCase.has(v)))           return false;
        if (f.technologyTag.size > 0     && !(p.technologyTags    || []).some(v => f.technologyTag.has(v)))     return false;
        if (f.measuredComponent.size > 0 && !(p.measuredComponent || []).some(v => f.measuredComponent.has(v))) return false;
        if (q) {
          const hay = [p.name, p.company,
            ...(p.industries||[]), ...(p.useCases||[]), p.description,
            ...(p.tags||[]), ...(p.technologyTags||[]), ...(p.measuredComponent||[])
          ].join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
    }

    // ── RENDER CARDS ──
    function renderCards(products) {
      const grid = document.getElementById("productGrid");
      grid.innerHTML = "";
      if (!products.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27h.79l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.516 6.516 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5z"/></svg>
            <h3>No products found</h3>
            <p>Try a different search term or clear your filters.</p>
          </div>`;
        return;
      }
      const isAdmin = user === "admin@adageautomation.com";
      products.forEach(p => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.onclick = () => openProduct(p);

        // Placeholder: pick a relevant Tabler icon based on first use case keyword
        const uc = ((p.useCases||[])[0] || '').toLowerCase();
        let icon = 'ti-atom';
        if (/flow|meter|coriolis/.test(uc))          icon = 'ti-ripple';
        else if (/pressure|dp/.test(uc))             icon = 'ti-gauge';
        else if (/temperature|thermal/.test(uc))     icon = 'ti-temperature';
        else if (/level/.test(uc))                   icon = 'ti-container';
        else if (/gas|analyzer|chromatograph/.test(uc)) icon = 'ti-test-pipe';
        else if (/valve|positioner/.test(uc))        icon = 'ti-valve';
        else if (/power|drive|motor|vfd/.test(uc))   icon = 'ti-bolt';
        else if (/protection|relay/.test(uc))        icon = 'ti-shield-bolt';

        const thumb = p.image
          ? `<img src="${p.image}" alt="${p.name}" />`
          : `<div class="placeholder-icon"><i class="ti ${icon}"></i></div>`;

        // Only 2 badges: Company + first Use Case
        const firstUseCase = (p.useCases||[])[0];
        const badges = [
          `<span class="badge badge-company">${p.company}</span>`,
          firstUseCase ? `<span class="badge badge-category">${firstUseCase}</span>` : ''
        ].join('');

        card.innerHTML = `
          <div class="card-thumb">${thumb}</div>
          <div class="card-body">
            <div class="card-meta">${badges}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.description}</div>
          </div>
          <div class="card-footer">
            <a class="btn-open-folder" href="${p.onedrive}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
              <i class="ti ti-folder-open"></i> Open File/Folder
            </a>
            <div class="card-footer-actions">
              ${isAdmin ? `<button type="button" class="btn-edit" onclick="event.stopPropagation(); openEditor(${p.id})">Edit</button>` : ""}
            </div>
          </div>`;
        grid.appendChild(card);
      });
    }

    function openProduct(p) {
      sessionStorage.setItem("adage_product", JSON.stringify(p));
      window.location.href = `product.html?id=${p.id}`;
    }

    function openEditor(id) {
      window.location.href = `adage-data-editor.html?id=${id}`;
    }

    function updateCount() {
      const filtered = getFiltered();
      const total = (window.PRODUCTS || []).length;
      const shown  = filtered.length;
      document.getElementById("resultsCount").innerHTML = shown === total
        ? `Showing all <strong>${total}</strong> products`
        : `Showing <strong>${shown}</strong> of <strong>${total}</strong> products`;
    }

    document.getElementById("searchInput").addEventListener("input", e => {
      searchQuery = e.target.value.trim();
      renderCards(getFiltered());
      updateCount();
    });

    // ── INIT ──
    async function init() {
      await loadProductsFromServer();
      document.getElementById("userName").textContent = user ? user.split("@")[0] : "";
      attachOptionListeners(); // attach delegation listeners once, to stable DOM nodes
      updateTriggerLabels();
      renderCards(getFiltered());
      updateCount();
    }

    init();
  </script>
</body>
</html>
